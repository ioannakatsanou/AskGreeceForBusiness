name: Deploy client to GitHub Pages

# Builds the Vite frontend (client/) and publishes it to GitHub Pages.
# The backend URL is injected at build time from the repository variable
# VITE_API_BASE_URL. If that variable is unset, the build has no backend URL and
# the frontend runs entirely on its mock fallback (still fully functional).

on:
  push:
    branches: [main]
    paths:
      - "client/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          # Set this repo variable to your Render URL to call the live backend.
          # Leave it unset to ship a pure-mock build.
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
